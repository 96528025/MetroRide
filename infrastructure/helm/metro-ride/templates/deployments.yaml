{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.repository }}/{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: {{ $.Release.Name }}-config
          env:
            - name: {{ replace "-" "_" (upper $name) }}_ADDR
              value: ":{{ $svc.port }}"
            {{- if eq $name "dispatch-service" }}
            - name: CONSUMER_GROUP
              value: dispatch-service
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- end }}
            {{- if eq $name "notification-service" }}
            - name: CONSUMER_GROUP
              value: notification-service
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ $svc.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
---
{{- end }}
