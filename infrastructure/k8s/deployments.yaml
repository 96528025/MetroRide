apiVersion: apps/v1
kind: Deployment
metadata:
  name: rider-service
  namespace: metroride
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rider-service
  template:
    metadata:
      labels:
        app: rider-service
    spec:
      containers:
        - name: rider-service
          image: metroride/rider-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: metroride-config
          env:
            - name: RIDER_SERVICE_ADDR
              value: ":8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-service
  namespace: metroride
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
    spec:
      containers:
        - name: dispatch-service
          image: metroride/dispatch-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: metroride-config
          env:
            - name: DISPATCH_SERVICE_ADDR
              value: ":8082"
            - name: CONSUMER_GROUP
              value: dispatch-service
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
---
