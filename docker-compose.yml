services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metroride
      POSTGRES_USER: metroride
      POSTGRES_PASSWORD: metroride
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metroride -d metroride"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rider-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE: rider-service
    environment:
      RIDER_SERVICE_ADDR: ":8080"
      POSTGRES_DSN: postgres://metroride:metroride@postgres:5432/metroride?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  driver-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE: driver-service
    environment:
      DRIVER_SERVICE_ADDR: ":8081"
      REDIS_ADDR: redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  driver-kafka-producer:
    profiles: ["kafka"]
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE: driver-service
    environment:
      DRIVER_SERVICE_ADDR: ":18081"
      REDIS_ADDR: redis:6379
      ENABLE_REDIS_LOCATION_STREAM: "false"
      ENABLE_KAFKA_LOCATION_STREAM: "true"
      KAFKA_BROKERS: kafka:9092
      KAFKA_DRIVER_LOCATION_TOPIC: metroride.driver.location.v1
    depends_on:
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  dispatch-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE: dispatch-service
    environment:
      DISPATCH_SERVICE_ADDR: ":8082"
      POSTGRES_DSN: postgres://metroride:metroride@postgres:5432/metroride?sslmode=disable
      REDIS_ADDR: redis:6379
      ROUTING_SERVICE_URL: http://routing-service:8083
      CONSUMER_GROUP: dispatch-service
      CONSUMER_NAME: dispatch-service-1
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      routing-service:
        condition: service_started

  routing-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE: routing-service
    environment:
      ROUTING_SERVICE_ADDR: ":8083"
      REDIS_ADDR: redis:6379
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy

  traffic-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE: traffic-service
    environment:
      TRAFFIC_SERVICE_ADDR: ":8084"
      REDIS_ADDR: redis:6379
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE: notification-service
    environment:
      NOTIFICATION_SERVICE_ADDR: ":8085"
      REDIS_ADDR: redis:6379
      CONSUMER_GROUP: notification-service
      CONSUMER_NAME: notification-service-1
    ports:
      - "8085:8085"
    depends_on:
      redis:
        condition: service_healthy

  analytics-service:
    profiles: ["kafka"]
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE: analytics-service
    environment:
      ANALYTICS_SERVICE_ADDR: ":8086"
      KAFKA_BROKERS: kafka:9092
      KAFKA_DRIVER_LOCATION_TOPIC: metroride.driver.location.v1
      KAFKA_CONSUMER_GROUP: metroride-analytics-service
    ports:
      - "8086:8086"
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  kafka:
    profiles: ["kafka"]
    image: apache/kafka:3.7.0
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 16777216
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-init:
    profiles: ["kafka"]
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic metroride.driver.location.v1 \
          --partitions 3 \
          --replication-factor 1

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - rider-service
      - dispatch-service
      - routing-service

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
